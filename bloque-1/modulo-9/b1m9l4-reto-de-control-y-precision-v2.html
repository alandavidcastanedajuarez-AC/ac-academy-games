<!doctype html>
<html lang="es">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domina el Espacio - Control Consciente</title>
  <style>
    body {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      overflow: auto;
    }

    html, body, .game-container {
      height: 100%;
      width: 100%;
    }

    .game-container {
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #1e3c72 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      min-height: 100%;
      position: relative;
    }

    .game-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .phase-content {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: fadeIn 0.5s ease-out;
      position: relative;
      z-index: 1;
      border: 1px solid rgba(255, 255, 255, 0.2);
      margin: 120px 40px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .game-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .game-title {
      font-size: 32px;
      font-weight: 800;
      color: #1e3c72;
      margin: 0 0 8px 0;
      line-height: 1.2;
    }

    .game-subtitle {
      font-size: 18px;
      color: #64748b;
      margin: 0;
      font-weight: 500;
    }

    .phase-indicator {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .phase-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #e2e8f0;
      transition: all 0.3s ease;
    }

    .phase-dot.active {
      background: #2a5298;
      width: 32px;
      border-radius: 6px;
    }

    .section-title {
      font-size: 24px;
      font-weight: 700;
      color: #1e3c72;
      margin: 0 0 16px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .emoji-icon {
      font-size: 28px;
    }

    .intro-message {
      font-size: 18px;
      color: #334155;
      line-height: 1.6;
      margin-bottom: 24px;
      padding: 20px;
      background: #f8fafc;
      border-radius: 12px;
      border-left: 4px solid #2a5298;
    }

    .court-visual {
      width: 100%;
      max-width: 400px;
      margin: 24px auto;
      padding: 24px;
      background: #065f46;
      border-radius: 12px;
      position: relative;
    }

    .court-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      background: white;
      padding: 2px;
      border-radius: 8px;
    }

    .court-zone {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #10b981;
      font-size: 14px;
      font-weight: 600;
      color: white;
      text-align: center;
      padding: 12px;
      transition: all 0.3s ease;
    }

    .court-zone:hover {
      background: #059669;
      transform: scale(1.05);
    }

    .challenge-box {
      background: #fef3c7;
      border-radius: 12px;
      padding: 24px;
      margin: 24px 0;
      border-left: 4px solid #f59e0b;
    }

    .challenge-title {
      font-size: 20px;
      font-weight: 700;
      color: #92400e;
      margin: 0 0 12px 0;
    }

    .challenge-instruction {
      font-size: 16px;
      color: #78350f;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .options-grid {
      display: grid;
      gap: 12px;
      margin: 20px 0;
    }

    .option-button {
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 16px 20px;
      font-size: 16px;
      font-weight: 600;
      color: #334155;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .option-button:hover {
      border-color: #2a5298;
      background: #f8fafc;
      transform: translateX(4px);
      box-shadow: 0 4px 12px rgba(42, 82, 152, 0.15);
    }

    .option-button.selected {
      background: #2a5298;
      border-color: #2a5298;
      color: white;
      transform: scale(1.02);
      box-shadow: 0 6px 16px rgba(42, 82, 152, 0.3);
    }

    .feedback-box {
      margin-top: 20px;
      padding: 20px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.6;
      animation: slideIn 0.4s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .feedback-excellent {
      background: #d1fae5;
      color: #065f46;
      border-left: 4px solid #10b981;
    }

    .feedback-good {
      background: #dbeafe;
      color: #1e40af;
      border-left: 4px solid #3b82f6;
    }

    .feedback-improve {
      background: #fed7aa;
      color: #92400e;
      border-left: 4px solid #f59e0b;
    }

    .principle-box {
      background: linear-gradient(135deg, #2a5298 0%, #1e3c72 100%);
      color: white;
      padding: 24px;
      border-radius: 12px;
      margin: 24px 0;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      line-height: 1.6;
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 32px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 140px;
      padding: 16px 28px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }

    .btn-primary {
      background: #2a5298;
      color: white;
    }

    .btn-primary:hover {
      background: #1e3c72;
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(42, 82, 152, 0.3);
    }

    .btn-secondary {
      background: white;
      color: #2a5298;
      border: 2px solid #2a5298;
    }

    .btn-secondary:hover {
      background: #f8fafc;
      transform: translateY(-2px);
    }

    .final-message {
      background: #fef3c7;
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      margin: 24px 0;
    }

    .final-title {
      font-size: 28px;
      font-weight: 800;
      color: #92400e;
      margin: 0 0 16px 0;
    }

    .final-subtitle {
      font-size: 18px;
      color: #78350f;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .benefits-list {
      text-align: left;
      display: inline-block;
      margin: 20px 0;
    }

    .benefit-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 16px;
      color: #334155;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .benefit-icon {
      font-size: 24px;
    }

    @media (max-width: 640px) {
      .phase-content {
        padding: 32px;
        margin: 80px 20px;
      }

      .game-title {
        font-size: 24px;
      }

      .game-subtitle {
        font-size: 16px;
      }

      .section-title {
        font-size: 20px;
      }

      .action-buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
 
<!-- AC_PHASE1_HELPERS_START -->
<style>
  .hidden { display: none !important; }
  .text-center, .center { text-align: center !important; }

  @media (max-width: 768px) {
    body {
      font-size: 16px;
    }

    .container,
    .game-container,
    .game-wrapper,
    .app-wrapper,
    .app-container,
    .main-wrapper,
    .stage-wrapper,
    .phase-container,
    .phase-card,
    .content,
    .content-area,
    .modal-content,
    .results-card,
    .scene,
    .phase-content {
      padding: 16px !important;
    }

    h1, .main-title, .game-title, .title {
      font-size: clamp(1.8rem, 7vw, 2.3rem) !important;
      line-height: 1.15 !important;
    }

    h2, .phase-title, .stage-title, .final-title, .section-title {
      font-size: clamp(1.3rem, 6vw, 1.7rem) !important;
      line-height: 1.25 !important;
    }

    h3, .subtitle, .game-subtitle, .phase-subtitle, .question-label {
      font-size: clamp(1rem, 4.5vw, 1.15rem) !important;
      line-height: 1.4 !important;
    }

    p, li, .instruction, .phase-description, .phase-instruction, .scenario-description, .principle-text, .intro-message, .quote {
      font-size: 1rem !important;
      line-height: 1.55 !important;
    }

    .button-group,
    .action-buttons,
    .final-buttons,
    .controls-row {
      flex-direction: column !important;
      gap: 12px !important;
    }

    button,
    .btn,
    .btn-primary,
    .btn-secondary,
    .action-button,
    .option-btn {
      width: 100% !important;
    }

    .zone-grid,
    .scenario-grid,
    .options-grid,
    .results-stats {
      grid-template-columns: 1fr !important;
    }
  }
</style>
<script>
  window.elementSdk = window.elementSdk || {
    init: async function () { return { isOk: true, value: null }; },
    on: function () {},
    emit: function () { return { isOk: true, value: null }; },
    setConfig: function () {},
    config: {}
  };

  window.dataSdk = window.dataSdk || {
    init: async function () { return { isOk: true, value: null }; },
    create: async function () { return { isOk: true, value: null }; },
    list: async function () { return { isOk: true, value: [] }; },
    update: async function () { return { isOk: true, value: null }; }
  };
</script>
<!-- AC_PHASE1_HELPERS_END -->
</head>
 <body>
  <div class="game-container">
   <div class="phase-content" id="content"><!-- Content will be dynamically rendered here -->
   </div>
  </div>
  <script>
    const defaultConfig = {
      game_title: "🎮 Domina el Espacio",
      game_subtitle: "Ritmo, dirección y calma táctica en cancha",
      intro_message: "La mayoría falla porque golpea sin objetivo. El control empieza cuando sabes a dónde va la pelota.",
      control_principle: "El control no es suavidad, es dirección repetida.",
      start_button_text: "Entrar al control",
      next_button_text: "Continuar",
      repeat_button_text: "Repetir juego",
      background_color: "#1e3c72",
      surface_color: "#ffffff",
      text_color: "#334155",
      primary_action_color: "#2a5298",
      secondary_action_color: "#10b981"
    };

    let currentPhase = 0;
    let selectedOptions = {};

    const phases = [
      {
        id: 'intro',
        render: () => renderIntro()
      },
      {
        id: 'challenge1',
        render: () => renderChallenge1()
      },
      {
        id: 'challenge2',
        render: () => renderChallenge2()
      },
      {
        id: 'challenge3',
        render: () => renderChallenge3()
      },
      {
        id: 'challenge4',
        render: () => renderChallenge4()
      },
      {
        id: 'final',
        render: () => renderFinal()
      }
    ];

    function renderIntro() {
      const config = window.elementSdk ? window.elementSdk.config : defaultConfig;
      return `
        <div class="game-header">
          <h1 class="game-title">${config.game_title || defaultConfig.game_title}</h1>
          <p class="game-subtitle">${config.game_subtitle || defaultConfig.game_subtitle}</p>
        </div>
        
        ${renderPhaseIndicator()}
        
        <h2 class="section-title">
          <span class="emoji-icon">🟦</span>
          FASE 1 — Cambia el objetivo: deja de golpear, empieza a apuntar
        </h2>
        
        <div class="intro-message">
          ${config.intro_message || defaultConfig.intro_message}
        </div>

        <div style="background: #e0f2fe; padding: 24px; border-radius: 12px; margin: 24px 0; border-left: 4px solid #0284c7;">
          <h3 style="margin: 0 0 12px 0; color: #075985; font-size: 18px; font-weight: 700;">👥 Este ejercicio se realiza con un compañero</h3>
          <p style="margin: 0; color: #0c4a6e; line-height: 1.6; font-size: 15px;">
            Necesitarás un compañero de práctica para realizar estos ejercicios. El objetivo no es jugar un partido, sino <strong>entrenar con intención específica</strong>. Tu compañero debe entender que están trabajando control y consistencia, no velocidad ni puntos ganadores.
          </p>
        </div>

        <div style="background: #f0fdfa; padding: 24px; border-radius: 12px; margin: 24px 0; border-left: 4px solid #14b8a6;">
          <h3 style="margin: 0 0 16px 0; color: #115e59; font-size: 18px; font-weight: 700;">🎯 ¿Por qu   dividimos la cancha en zonas?</h3>
          <p style="margin: 0 0 16px 0; color: #134e4a; line-height: 1.6; font-size: 15px;">
            Cada zona tiene un propósito táctico diferente. El error más común es golpear sin saber a dónde va la pelota. Los jugadores avanzados <strong>siempre tienen una intención clara</strong> antes de golpear.
          </p>
          <p style="margin: 0; color: #134e4a; line-height: 1.6; font-size: 15px;">
            En este ejercicio aprenderás a <strong>controlar cada zona conscientemente</strong>, eligiendo la dirección según tu posición y objetivo táctico.
          </p>
        </div>
        
        <div class="court-visual">
          <div class="court-grid">
            <div class="court-zone">Zona<br>Cruzada<br><span style="font-size: 11px; opacity: 0.9;">🔹 Mayor margen</span></div>
            <div class="court-zone">Zona<br>Paralela<br><span style="font-size: 11px; opacity: 0.9;">⚡ Mayor riesgo</span></div>
            <div class="court-zone">Zona<br>Central<br><span style="font-size: 11px; opacity: 0.9;">🛡️ Control seguro</span></div>
            <div class="court-zone">Esquinas<br><span style="font-size: 11px; opacity: 0.9;">🎯 Precisión</span></div>
          </div>
        </div>
        
        <div class="principle-box">
          💡 ${config.control_principle || defaultConfig.control_principle}
        </div>
        
        <div class="action-buttons">
          <button class="btn btn-primary" onclick="nextPhase()">${config.start_button_text || defaultConfig.start_button_text}</button>
        </div>
      `;
    }

    function renderChallenge1() {
      const config = window.elementSdk ? window.elementSdk.config : defaultConfig;
      const selected = selectedOptions['challenge1'];
      
      let feedbackHtml = '';
      if (selected) {
        const feedbacks = {
          'excellent': { 
            class: 'feedback-excellent', 
            text: `🔥 <strong>Excelente trabajo.</strong><br><br>
                   Lograste mantener 10 golpes cruzados con control. Esto significa que:<br>
                   • Tu equilibrio fue consistente<br>
                   • Tu timing estuvo sincronizado<br>
                   • Priorizaste dirección sobre potencia<br><br>
                   <strong>En partido:</strong> Esta habilidad te permite construir puntos sólidos, forzar errores del rival sin arriesgar, y mantener el control del rally. El cruzado bien ejecutado es la base del tenis de alto nivel.` 
          },
          'good': { 
            class: 'feedback-good', 
            text: `🙂 <strong>Vas por buen camino.</strong><br><br>
                   Lograste entre 6 y 9 golpes. Estás desarrollando el patrón, pero aún hay inconsistencias.<br><br>
                   <strong>Ajustes recomendados:</strong><br>
                   • Baja el ritmo de golpeo (menos velocidad = más control)<br>
                   • Asegúrate de terminar cada golpe mirando hacia donde apuntas<br>
                   • Respira entre golpes para mantener la calma<br><br>
                   <strong>Consejo:</strong> No te frustres. La consistencia se construye con repetición consciente, no con esfuerzo. Repite este ejercicio hasta sentir que puedes hacerlo con los ojos cerrados.` 
          },
          'improve': { 
            class: 'feedback-improve', 
            text: `😕 <strong>Necesitas ajustar tu enfoque.</strong><br><br>
                   Si lograste menos de 6 golpes, probablemente estás:<br>
                   • Golpeando más fuerte de lo necesario<br>
                   • Perdiendo el equilibrio entre golpes<br>
                   • No ajustando bien la posición de tus pies<br><br>
                   <strong>Solución inmediata:</strong><br>
                   Reduce la velocidad a la mitad. Literalmente. El objetivo es <strong>dirección repetida</strong>, no potencia. Concéntrate en que cada pelota cruce la red con 1 metro de altura y caiga en la zona cruzada. Olvídate de "golpear fuerte".<br><br>
                   <strong>Repite el ejercicio</strong> con esta mentalidad: "Suave, profundo, cruzado". Verás resultados inmediatos.` 
          }
        };
        const feedback = feedbacks[selected];
        feedbackHtml = `<div class="feedback-box ${feedback.class}">${feedback.text}</div>`;
      }
      
      return `
        <div class="game-header">
          <h1 class="game-title">${config.game_title || defaultConfig.game_title}</h1>
        </div>
        
        ${renderPhaseIndicator()}
        
        <h2 class="section-title">
          <span class="emoji-icon">🟩</span>
          FASE 2 — Reto Cruzado: consistencia antes que todo
        </h2>

        <div style="background: #fef3c7; padding: 20px; border-radius: 12px; margin-bottom: 24px; border-left: 4px solid #f59e0b;">
          <h4 style="margin: 0 0 12px 0; color: #92400e; font-size: 16px; font-weight: 700;">📋 Instrucciones para el ejercicio</h4>
          <p style="margin: 0 0 12px 0; color: #78350f; line-height: 1.6; font-size: 14px;">
            <strong>Posición inicial:</strong> Ambos jugadores desde el fondo de la cancha, en el centro.<br>
            <strong>Objetivo:</strong> Mantener un rally de 10 golpes consecutivos, todos cruzados (derecha a derecha, o revés a revés).<br>
            <strong>Regla clave:</strong> Si la pelota sale fuera de la zona cruzada, reinician el conteo.
          </p>
          <p style="margin: 0; color: #78350f; line-height: 1.6; font-size: 14px;">
                ️ <strong>No busques velocidad.</strong> Busca que cada pelota caiga en zona cruzada con altura segura sobre la red.
          </p>
        </div>
        
        <div class="challenge-box">
          <h3 class="challenge-title">🎯 Reto 1 – Cruzado controlado</h3>
          <div class="challenge-instruction">
            Mantén <strong>10 golpes cruzados consecutivos</strong><br>
            con tu compañero, sin buscar velocidad.
          </div>
          
          <div style="text-align: center; margin: 20px 0; font-size: 40px; line-height: 1.4;">
            🎾 ➡️ 🎾 ➡️ 🎾 ➡️ 🎾
          </div>
          
          <p style="font-weight: 700; color: #92400e; margin: 20px 0 12px 0; font-size: 15px;">¿Cómo te fue?</p>
          
          <div class="options-grid">
            <button class="option-button ${selected === 'excellent' ? 'selected' : ''}" 
                    onclick="selectOption('challenge1', 'excellent')">
                  Logré los 10 golpes
            </button>
            <button class="option-button ${selected === 'good' ? 'selected' : ''}" 
                    onclick="selectOption('challenge1', 'good')">
              🙂 Llegué entre 6 y 9
            </button>
            <button class="option-button ${selected === 'improve' ? 'selected' : ''}" 
                    onclick="selectOption('challenge1', 'improve')">
              😕 Menos de 6 golpes
            </button>
          </div>
          
          ${feedbackHtml}
        </div>
        
        <div class="principle-box">
          💡 <strong>Principio fundamental:</strong> El cruzado estable construye el punto.<br>
          <span style="font-size: 15px; opacity: 0.95; display: block; margin-top: 8px;">
            El 70% de los golpes en un partido profesional son cruzados. Domina esto y tendrás la base del tenis ganador.
          </span>
        </div>
        
        <div class="action-buttons">
          <button class="btn btn-secondary" onclick="previousPhase()">Volver</button>
          <button class="btn btn-primary" onclick="nextPhase()" ${!selected ? 'style="opacity: 0.5; cursor: not-allowed;"' : ''}>${config.next_button_text || defaultConfig.next_button_text}</button>
        </div>
      `;
    }

    function renderChallenge2() {
      const config = window.elementSdk ? window.elementSdk.config : defaultConfig;
      const selectedDecision = selectedOptions['challenge2-decision'];
      const selectedEval = selectedOptions['challenge2-eval'];
      
      let decisionFeedback = '';
      if (selectedDecision) {
        const feedbacks = {
          'correct': {
            class: 'feedback-excellent',
            text: `<strong>Exacto. Esta es la clave táctica.</strong><br><br>
                   El paralelo es un golpe de <strong>oportunidad</strong>, no de rutina. Solo debe ejecutarse cuando:<br>
                   • Estás bien posicionado y equilibrado<br>
                   • Tienes tiempo suficiente para preparar el golpe<br>
                   • La pelota viene a una altura cómoda<br><br>
                   Forzar el paralelo desde mala posición es el error #1 que genera puntos perdidos en jugadores intermedios.`
          },
          'always': {
            class: 'feedback-improve',
            text: `<strong>Cuidado con esta mentalidad.</strong><br><br>
                   Golpear paralelo "siempre" es una receta para acumular errores no forzados. El paralelo:<br>
                   • Cruza menos distancia sobre la red<br>
                   • Tiene menor margen de error lateral<br>
                   • Requiere mayor precisión<br><br>
                   Úsalo como un <strong>golpe táctico</strong>, no como patrón por defecto.`
          },
          'define': {
            class: 'feedback-good',
            text: `<strong>Parcialmente correcto, pero incompleto.</strong><br><br>
                   Sí, el paralelo puede ser un golpe definitorio, pero <strong>solo si estás en posición</strong>. Muchos jugadores intentan "definir" desde posiciones comprometidas y terminan regalando el punto.<br><br>
                   La pregunta correcta es: "¿Estoy en posición para ejecutarlo con control?" Si la respuesta es no, vuelve al cruzado.`
          },
          'never': {
            class: 'feedback-improve',
            text: `<strong>No tan rápido.</strong><br><br>
                   Nunca usar el paralelo te limita tácticamente. El paralelo bien ejecutado:<br>
                   • Sorprende al rival<br>
                   • Cambia el ritmo del punto<br>

        </div>
        
        <div class="challenge-box">
          <h3 class="challenge-title">     Basándote en lo que sentiste hoy, ¿qué necesitas entrenar más?</h3>
          
          <div class="options-grid">
            <button class="option-button ${selected === 'rhythm' ? 'selected' : ''}" 
                    onclick="selectOption('final', 'rhythm')">
              🎵 Ritmo y consistencia
            </button>
            <button class="option-button ${selected === 'direction' ? 'selected' : ''}" 
                    onclick="selectOption('final', 'direction')">
              🎯 Dirección intencional
            </button>
            <button class="option-button ${selected === 'precision' ? 'selected' : ''}" 
                    onclick="selectOption('final', 'precision')">
              🔍 Precisión en objetivos
            </button>
            <button class="option-button ${selected === 'calm' ? 'selected' : ''}" 
                    onclick="selectOption('final', 'calm')">
              🧘 Calma y control mental
            </button>
          </div>
          
          ${selected ? `
            <div class="feedback-box feedback-excellent">
              <div style="font-size: 32px; margin-bottom: 16px;">${messages[selected].icon}</div>
              <div style="font-size: 20px; font-weight: 800; margin-bottom: 12px; color: #065f46;">${messages[selected].title}</div>
              <div style="line-height: 1.7; font-size: 15px; font-weight: 500; color: #064e3b;">${messages[selected].description}</div>
            </div>
          ` : ''}
        </div>
        
        ${selected ? `
          <div class="final-message">
            <h2 class="final-title">🏁 El control no se improvisa.<br>Se entrena con intención.</h2>
            <p class="final-subtitle">Si entrenas esto conscientemente durante las próximas semanas, verás resultados tangibles en partido:</p>
            
            <div class="benefits-list">
              <div class="benefit-item">
                <span class="benefit-icon">   </span>
                <strong>Más pelotas dentro:</strong> Menos errores no forzados, más consistencia
              </div>
              <div class="benefit-item">
                <span class="benefit-icon">✅</span>
                <strong>Más puntos construidos:</strong> Ganas puntos sin arriesgar innecesariamente
              </div>
              <div class="benefit-item">
                <span class="benefit-icon">✅</span>
                <strong>Más confianza:</strong> Sabes que puedes controlar el resultado con tu técnica
              </div>
            </div>

            <div style="margin-top: 24px; padding: 20px; background: #fef3c7; border-radius: 12px; border-left: 4px solid #f59e0b;">
              <p style="margin: 0; color: #78350f; line-height: 1.6; font-size: 15px; font-weight: 600;">
                💡 <strong>Recuerda:</strong> El control no se logra golpeando más fuerte. Se logra <strong>dirigiendo con intención</strong>. Cada golpe debe tener un propósito claro. Esa es la diferencia entre jugadores intermedios y avanzados.
              </p>
            </div>
          </div>
          
          <div class="action-buttons">
            <button class="btn btn-secondary" onclick="resetGame()">${config.repeat_button_text || defaultConfig.repeat_button_text}</button>
            <button class="btn btn-primary" onclick="showFinalMessage()">Ver plan de acción 🎾</button>
          </div>
        ` : `
          <div class="action-buttons">
            <button class="btn btn-secondary" onclick="previousPhase()">Volver</button>
          </div>
        `}
      `;
    }

    function showFinalMessage() {
      const selected = selectedOptions['final'];
      const plans = {
        'rhythm': `📋 Plan de acción para RITMO:\n\n1. Practica el Reto 1 (cruzado) 15 minutos cada entrenamiento\n2. Meta: 20 golpes consecutivos sin error\n3. Cuando lo logres, aumenta a 30\n4. Nunca aceleres, busca tempo constante\n\n¡Lleva esto a la cancha hoy mismo!`,
        'direction': `📋 Plan de acción para DIRECCIÓN:\n\n1. Practica el Reto 2 (paralelo) 3 veces por semana\n2. Alterna: 5 cruzados → 1 paralelo → 5 cruzados\n3. Foco en cambio consciente de dirección\n4. Pregunta antes de cada golpe: "¿Dónde quiero que vaya?"\n\n¡Lleva esto a la cancha hoy mismo!`,
        'precision': `📋 Plan de acción para PRECISIÓN:\n\n1. Practica el Reto 3 (conos) 20 minutos, 3x/semana\n2. Meta inicial: 6 de 10 aciertos\n3. Meta avanzada: 8 de 10 aciertos\n4. Visualiza el objetivo 2 segundos antes de golpear\n\n¡Lleva esto a la cancha hoy mismo!`,
        'calm': `📋 Plan de acción para CALMA:\n\n1. Practica el Reto 4 (centro) con respiración consciente\n2. Exhala antes de cada golpe\n3. Cuenta hasta 3 entre golpes\n4. Cuando sientas presión, vuelve al centro\n\n¡Lleva esto a la cancha hoy mismo!`
      };
      
      const messageBox = document.createElement('div');
      messageBox.style.cssText = `
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 32px;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        max-width: 500px;
        width: 90%;
        z-index: 1000;
        animation: fadeIn 0.3s ease-out;
      `;
      
      messageBox.innerHTML = `
        <h3 style="margin: 0 0 20px 0; color: #1e3c72; font-size: 22px; font-weight: 800;">📋 Tu Plan de Acción Personalizado</h3>
        <div style="background: #f8fafc; padding: 20px; border-radius: 12px; margin-bottom: 24px; white-space: pre-line; line-height: 1.8; color: #334155; font-size: 15px;">
          ${plans[selected]}
        </div>
        <button onclick="this.parentElement.remove()" style="width: 100%; padding: 16px; background: #2a5298; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer;">
          ¡Entendido! 🎾
        </button>
      `;
      
      document.body.appendChild(messageBox);
    }

    function renderPhaseIndicator() {
      return `
        <div class="phase-indicator">
          ${phases.map((_, index) => `
            <div class="phase-dot ${index === currentPhase ? 'active' : ''}"></div>
          `).join('')}
        </div>
      `;
    }

    function selectOption(challenge, value) {
      selectedOptions[challenge] = value;
      render();
    }

    function nextPhase() {
      if (currentPhase === 1 && !selectedOptions['challenge1']) return;
      if (currentPhase === 2 && !selectedOptions['challenge2-eval']) return;
      if (currentPhase === 3 && !selectedOptions['challenge3']) return;
      if (currentPhase === 4 && !selectedOptions['challenge4']) return;
      
      if (currentPhase < phases.length - 1) {
        currentPhase++;
        render();
        window.scrollTo(0, 0);
      }
    }

    function previousPhase() {
      if (currentPhase > 0) {
        currentPhase--;
        render();
        window.scrollTo(0, 0);
      }
    }

    function resetGame() {
      currentPhase = 0;
      selectedOptions = {};
      render();
      window.scrollTo(0, 0);
    }

    function render() {
      const content = document.getElementById('content');
      content.innerHTML = phases[currentPhase].render();
    }

    async function onConfigChange(config) {
      const container = document.querySelector('.game-container');
      const title = document.querySelector('.game-title');
      const subtitle = document.querySelector('.game-subtitle');
      
      if (container) {
        container.style.background = `linear-gradient(135deg, ${config.background_color || defaultConfig.background_color} 0%, ${config.primary_action_color || defaultConfig.primary_action_color} 100%)`;
      }
      
      if (title) {
        title.textContent = config.game_title || defaultConfig.game_title;
        title.style.color = config.primary_action_color || defaultConfig.primary_action_color;
      }
      
      if (subtitle) {
        subtitle.textContent = config.game_subtitle || defaultConfig.game_subtitle;
      }
      
      const phaseContent = document.querySelector('.phase-content');
      if (phaseContent) {
        phaseContent.style.background = config.surface_color || defaultConfig.surface_color;
      }
      
      const allText = document.querySelectorAll('.intro-message, .challenge-instruction, .benefit-item');
      allText.forEach(el => {
        el.style.color = config.text_color || defaultConfig.text_color;
      });
      
      const primaryButtons = document.querySelectorAll('.btn-primary');
      primaryButtons.forEach(btn => {
        btn.style.background = config.primary_action_color || defaultConfig.primary_action_color;
      });
      
      const secondaryButtons = document.querySelectorAll('.btn-secondary');
      secondaryButtons.forEach(btn => {
        btn.style.color = config.primary_action_color || defaultConfig.primary_action_color;
        btn.style.borderColor = config.primary_action_color || defaultConfig.primary_action_color;
      });
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities: (config) => ({
          recolorables: [
            {
              get: () => config.background_color || defaultConfig.background_color,
              set: (value) => {
                config.background_color = value;
                window.elementSdk.setConfig({ background_color: value });
              }
            },
            {
              get: () => config.surface_color || defaultConfig.surface_color,
              set: (value) => {
                config.surface_color = value;
                window.elementSdk.setConfig({ surface_color: value });
              }
            },
            {
              get: () => config.text_color || defaultConfig.text_color,
              set: (value) => {
                config.text_color = value;
                window.elementSdk.setConfig({ text_color: value });
              }
            },
            {
              get: () => config.primary_action_color || defaultConfig.primary_action_color,
              set: (value) => {
                config.primary_action_color = value;
                window.elementSdk.setConfig({ primary_action_color: value });
              }
            },
            {
              get: () => config.secondary_action_color || defaultConfig.secondary_action_color,
              set: (value) => {
                config.secondary_action_color = value;
                window.elementSdk.setConfig({ secondary_action_color: value });
              }
            }
          ],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ["game_title", config.game_title || defaultConfig.game_title],
          ["game_subtitle", config.game_subtitle || defaultConfig.game_subtitle],
          ["intro_message", config.intro_message || defaultConfig.intro_message],
          ["control_principle", config.control_principle || defaultConfig.control_principle],
          ["start_button_text", config.start_button_text || defaultConfig.start_button_text],
          ["next_button_text", config.next_button_text || defaultConfig.next_button_text],
          ["repeat_button_text", config.repeat_button_text || defaultConfig.repeat_button_text]
        ])
      });
    }

    render();
  </script>
<!-- AC_SCROLL_HELPERS_START -->
<script>
  function acScrollToTop() {
    try {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (e) {
      window.scrollTo(0, 0);
    }
  }

  function acScrollToElement(id, offset) {
    var target = document.getElementById(id);
    if (!target) {
      acScrollToTop();
      return;
    }

    var top = target.getBoundingClientRect().top + window.pageYOffset - (offset || 24);

    try {
      window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
    } catch (e) {
      window.scrollTo(0, Math.max(0, top));
    }
  }

  document.addEventListener('DOMContentLoaded', function () {
    window.scrollTo(0, 0);
  });
</script>
<!-- AC_SCROLL_HELPERS_END -->
</body>
</html>
