<!doctype html>
<html lang="es" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analiza tu Partido</title>
  <style>
    body {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1729 100%);
      color: #e2e8f0;
      overflow-x: hidden;
      position: relative;
    }

    html, body, #app {
      height: 100%;
      width: 100%;
    }

    .bg-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(59, 130, 246, 0.3);
      border-radius: 50%;
      animation: float 20s infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100%) translateX(50px); opacity: 0; }
    }

    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem;
      overflow-y: auto;
      position: relative;
      z-index: 1;
    }

    .main-container {
      max-width: 900px;
      width: 100%;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 3.5rem 3rem;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5), 0 0 100px rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(148, 163, 184, 0.15);
      margin-bottom: 2rem;
      position: relative;
      animation: slideIn 0.6s ease-out;
    }

    @keyframes slideIn {
      from { 
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .progress-bar-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: rgba(148, 163, 184, 0.1);
      border-radius: 32px 32px 0 0;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
    }

    .phase-tracker {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-bottom: 3rem;
      flex-wrap: wrap;
    }

    .phase-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(100, 116, 139, 0.3);
      transition: all 0.4s ease;
      position: relative;
    }

    .phase-dot.completed {
      background: linear-gradient(135deg, #10b981, #059669);
      box-shadow: 0 0 12px rgba(16, 185, 129, 0.5);
    }

    .phase-dot.active {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.8);
      transform: scale(1.5);
    }

    .phase-counter {
      font-size: 0.9rem;
      color: #64748b;
      font-weight: 600;
      margin-left: 12px;
    }

    .phase-counter.active {
      color: #3b82f6;
    }

    h1 {
      font-size: 3rem;
      font-weight: 900;
      margin: 0 0 1rem 0;
      background: linear-gradient(135deg, #f1f5f9, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      text-align: center;
    }

    .hero-emoji {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      display: block;
      text-align: center;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .subtitle {
      font-size: 1.35rem;
      color: #94a3b8;
      text-align: center;
      margin: 0 0 2.5rem 0;
      line-height: 1.6;
      font-weight: 300;
    }

    .intro-philosophy {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(139, 92, 246, 0.1));
      border-left: 5px solid #3b82f6;
      border-radius: 16px;
      padding: 2.5rem;
      margin: 2.5rem 0;
    }

    .intro-philosophy h3 {
      margin: 0 0 1.5rem 0;
      color: #60a5fa;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .philosophy-points {
      display: grid;
      gap: 1.25rem;
    }

    .philosophy-point {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }

    .philosophy-icon {
      font-size: 1.75rem;
      flex-shrink: 0;
    }

    .philosophy-text {
      flex: 1;
    }

    .philosophy-text strong {
      color: #f1f5f9;
      font-size: 1.1rem;
      display: block;
      margin-bottom: 0.4rem;
    }

    .philosophy-text p {
      margin: 0;
      color: #cbd5e1;
      line-height: 1.7;
      font-size: 0.95rem;
    }

    .phase-header {
      text-align: center;
      margin-bottom: 3rem;
      position: relative;
    }

    .phase-number {
      font-size: 0.85rem;
      color: #3b82f6;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.75rem;
    }

    .phase-title {
      font-size: 2.5rem;
      font-weight: 800;
      margin: 0 0 1.25rem 0;
      color: #f1f5f9;
      line-height: 1.2;
    }

    .phase-description {
      font-size: 1.2rem;
      color: #94a3b8;
      line-height: 1.7;
      max-width: 700px;
      margin: 0 auto 1rem auto;
    }

    .phase-why {
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin: 1.5rem auto;
      max-width: 700px;
      text-align: left;
    }

    .phase-why strong {
      color: #c4b5fd;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: block;
      margin-bottom: 0.5rem;
    }

    .phase-why p {
      margin: 0;
      color: #cbd5e1;
      font-size: 0.95rem;
      line-height: 1.6;
      font-style: italic;
    }

    .question-section {
      margin: 2.5rem 0;
    }

    .question {
      font-size: 1.6rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 2rem;
      text-align: center;
      line-height: 1.4;
    }

    .sub-question {
      font-size: 1.15rem;
      color: #94a3b8;
      margin-bottom: 1.5rem;
      text-align: center;
      font-weight: 400;
    }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin: 2rem 0;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .input-group.full-width {
      grid-column: 1 / -1;
    }

    .input-label {
      font-size: 0.95rem;
      color: #cbd5e1;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .input-label-icon {
      font-size: 1.2rem;
    }

    .text-input, .textarea-input, .select-input {
      width: 100%;
      background: rgba(30, 41, 59, 0.6);
      border: 2px solid rgba(148, 163, 184, 0.2);
      border-radius: 12px;
      padding: 1rem;
      color: #e2e8f0;
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .textarea-input {
      resize: vertical;
      min-height: 100px;
    }

    .text-input:focus, .textarea-input:focus, .select-input:focus {
      outline: none;
      border-color: #3b82f6;
      background: rgba(30, 41, 59, 0.9);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .text-input::placeholder, .textarea-input::placeholder {
      color: #64748b;
    }

    .options-grid {
      display: grid;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .options-grid.two-columns {
      grid-template-columns: 1fr 1fr;
    }

    .options-grid.three-columns {
      grid-template-columns: repeat(3, 1fr);
    }

    .option-card {
      background: rgba(30, 41, 59, 0.6);
      border: 2px solid rgba(148, 163, 184, 0.15);
      border-radius: 16px;
      padding: 1.75rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: flex-start;
      gap: 1.25rem;
      position: relative;
      overflow: hidden;
    }

    .option-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }

    .option-card:hover {
      background: rgba(30, 41, 59, 0.9);
      border-color: #3b82f6;
      transform: translateX(8px);
    }

    .option-card:hover::before {
      transform: scaleX(1);
    }

    .option-card.selected {
      background: rgba(59, 130, 246, 0.15);
      border-color: #3b82f6;
      box-shadow: 0 8px 30px rgba(59, 130, 246, 0.25);
    }

    .option-card.selected::before {
      transform: scaleX(1);
    }

    .option-icon {
      font-size: 2.5rem;
      flex-shrink: 0;
      line-height: 1;
    }

    .option-content {
      flex: 1;
    }

    .option-title {
      font-size: 1.125rem;
      font-weight: 600;
      color: #f1f5f9;
      margin: 0 0 0.5rem 0;
    }

    .option-description {
      font-size: 0.95rem;
      color: #94a3b8;
      line-height: 1.5;
      margin: 0;
    }

    .compact-card {
      padding: 1.25rem;
      text-align: center;
    }

    .compact-card .option-icon {
      font-size: 2rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    .compact-card .option-content {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .compact-card .option-title {
      margin: 0;
      font-size: 1rem;
    }

    .intensity-section, .rating-section {
      background: rgba(51, 65, 85, 0.4);
      border-radius: 16px;
      padding: 2rem;
      margin: 2rem 0;
    }

    .section-label {
      font-size: 1.05rem;
      color: #cbd5e1;
      margin-bottom: 1.5rem;
      text-align: center;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }

    .slider-input {
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: rgba(148, 163, 184, 0.2);
      outline: none;
      margin-bottom: 1rem;
      -webkit-appearance: none;
    }

    .slider-input::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(59, 130, 246, 0.5);
    }

    .slider-input::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 10px rgba(59, 130, 246, 0.5);
    }

    .slider-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 0.5rem;
    }

    .slider-value {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 800;
      color: #3b82f6;
      margin-top: 1rem;
    }

    .multi-rating-grid {
      display: grid;
      gap: 2rem;
    }

    .rating-item {
      background: rgba(30, 41, 59, 0.6);
      border-radius: 12px;
      padding: 1.5rem;
    }

    .rating-label {
      font-size: 1rem;
      color: #cbd5e1;
      margin-bottom: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .insight-box {
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.15), rgba(5, 150, 105, 0.1));
      border-left: 5px solid #10b981;
      padding: 2rem;
      border-radius: 12px;
      margin: 2.5rem 0;
      position: relative;
    }

    .insight-box::before {
      content: '💡';
      position: absolute;
      top: 2rem;
      right: 2rem;
      font-size: 1.75rem;
      opacity: 0.5;
    }

    .insight-title {
      font-size: 0.95rem;
      font-weight: 800;
      color: #6ee7b7;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin: 0 0 1rem 0;
    }

    .insight-text {
      font-size: 1.15rem;
      line-height: 1.8;
      color: #d1fae5;
      margin: 0;
    }

    .principle-box {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(124, 58, 237, 0.1));
      border-left: 5px solid #8b5cf6;
      padding: 2rem;
      border-radius: 12px;
      margin: 2.5rem 0;
      position: relative;
    }

    .principle-box::before {
      content: '🎯';
      position: absolute;
      top: 2rem;
      right: 2rem;
      font-size: 1.75rem;
      opacity: 0.5;
    }

    .principle-title {
      font-size: 0.95rem;
      font-weight: 800;
      color: #c4b5fd;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin: 0 0 1rem 0;
    }

    .principle-text {
      font-size: 1.15rem;
      line-height: 1.8;
      color: #e9d5ff;
      margin: 0;
    }

    .actionable-box {
      background: linear-gradient(135deg, rgba(236, 72, 153, 0.15), rgba(219, 39, 119, 0.1));
      border-left: 5px solid #ec4899;
      padding: 2rem;
      border-radius: 12px;
      margin: 2.5rem 0;
      position: relative;
    }

    .actionable-box::before {
      content: '⚡';
      position: absolute;
      top: 2rem;
      right: 2rem;
      font-size: 1.75rem;
      opacity: 0.5;
    }

    .actionable-title {
      font-size: 0.95rem;
      font-weight: 800;
      color: #fbcfe8;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin: 0 0 1rem 0;
    }

    .actionable-text {
      font-size: 1.15rem;
      line-height: 1.8;
      color: #fce7f3;
      margin: 0;
    }

    .drill-card {
      background: rgba(30, 41, 59, 0.8);
      border: 2px solid #3b82f6;
      border-radius: 16px;
      padding: 2rem;
      margin: 1.5rem 0;
    }

    .drill-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .drill-icon {
      font-size: 2.25rem;
    }

    .drill-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #60a5fa;
      margin: 0;
    }

    .drill-content {
      color: #cbd5e1;
      line-height: 1.7;
      font-size: 1rem;
    }

    .drill-content strong {
      color: #f1f5f9;
      display: block;
      margin-top: 0.75rem;
      margin-bottom: 0.25rem;
    }

    .button-group {
      display: flex;
      gap: 1rem;
      margin-top: 3rem;
    }

    .primary-btn {
      flex: 1;
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      border: none;
      padding: 1.35rem 2.5rem;
      border-radius: 14px;
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
      position: relative;
      overflow: hidden;
    }

    .primary-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .primary-btn:hover:not(:disabled)::before {
      left: 100%;
    }

    .primary-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(59, 130, 246, 0.5);
    }

    .primary-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .secondary-btn {
      background: transparent;
      color: #94a3b8;
      border: 2px solid rgba(148, 163, 184, 0.3);
      padding: 1.35rem 2rem;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .secondary-btn:hover {
      border-color: #3b82f6;
      color: #3b82f6;
      background: rgba(59, 130, 246, 0.05);
    }

    .summary-section {
      margin-top: 3rem;
    }

    .summary-hero {
      text-align: center;
      margin-bottom: 3rem;
    }

    .summary-hero-emoji {
      font-size: 5rem;
      display: block;
      margin-bottom: 1rem;
      animation: pulse 2s ease-in-out infinite;
    }

    .summary-title {
      font-size: 2.75rem;
      font-weight: 900;
      margin: 0 0 1rem 0;
      background: linear-gradient(135deg, #10b981, #3b82f6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    .evolution-grid {
      display: grid;
      gap: 2rem;
      margin: 3rem 0;
    }

    .evolution-category {
      background: rgba(30, 41, 59, 0.6);
      border-radius: 20px;
      padding: 2.5rem;
      border: 2px solid rgba(148, 163, 184, 0.15);
      position: relative;
      overflow: hidden;
    }

    .evolution-category::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
    }

    .evolution-category-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .evolution-category-icon {
      font-size: 2.5rem;
    }

    .evolution-category-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f1f5f9;
      margin: 0;
    }

    .evolution-items {
      display: grid;
      gap: 1.5rem;
    }

    .evolution-item {
      background: rgba(51, 65, 85, 0.4);
      border-radius: 12px;
      padding: 1.5rem;
    }

    .evolution-item-label {
      font-size: 0.85rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.75rem;
      font-weight: 700;
    }

    .evolution-item-value {
      font-size: 1.15rem;
      color: #f1f5f9;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 0.5rem;
    }

    .evolution-item-context {
      font-size: 0.95rem;
      color: #94a3b8;
      line-height: 1.5;
      font-style: italic;
    }

    .action-plan-section {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(139, 92, 246, 0.15));
      border: 3px solid rgba(59, 130, 246, 0.4);
      border-radius: 24px;
      padding: 3rem;
      margin: 3rem 0;
    }

    .action-plan-title {
      font-size: 2rem;
      font-weight: 800;
      color: #60a5fa;
      text-align: center;
      margin: 0 0 2.5rem 0;
    }

    .commitment-box {
      background: rgba(30, 41, 59, 0.8);
      border-radius: 16px;
      padding: 2rem;
      margin-top: 2.5rem;
      border: 2px solid #ec4899;
    }

    .commitment-label {
      font-size: 1.1rem;
      color: #fbcfe8;
      margin-bottom: 1rem;
      font-weight: 700;
      text-align: center;
    }

    .final-message-box {
      text-align: center;
      font-size: 1.4rem;
      line-height: 1.9;
      color: #cbd5e1;
      margin: 3rem 0;
      padding: 3rem;
      background: rgba(59, 130, 246, 0.05);
      border-radius: 24px;
      border: 2px solid rgba(59, 130, 246, 0.2);
      font-weight: 300;
    }

    .final-cta {
      font-weight: 800;
      color: #60a5fa;
      display: block;
      margin-top: 1.5rem;
      font-size: 1.25rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.25rem;
      margin: 2.5rem 0;
    }

    .stat-card {
      background: rgba(51, 65, 85, 0.4);
      border-radius: 14px;
      padding: 1.75rem 1.25rem;
      text-align: center;
      border: 1px solid rgba(148, 163, 184, 0.1);
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }

    .stat-value {
      font-size: 2.25rem;
      font-weight: 900;
      color: #3b82f6;
      margin-bottom: 0.5rem;
    }

    .stat-label {
      font-size: 0.8rem;

      const container = document.getElementById('particles');

        particle.style.animationDuration = (15 + Math.random() * 10) + 's';
        container.appendChild(particle);
      }
    }

    function updateProgressBar() {
      const progress = ((currentPhase + 1) / (totalPhases + 1)) * 100;
      document.getElementById('progressBar').style.width = progress + '%';
    }

    function updatePhaseTracker() {
      const tracker = document.getElementById('phaseTracker');
      tracker.innerHTML = '';
      
      for (let i = 0; i < totalPhases; i++) {
        const dot = document.createElement('div');
        dot.className = 'phase-dot';
        if (i < currentPhase) dot.classList.add('completed');
        if (i === currentPhase) dot.classList.add('active');
        tracker.appendChild(dot);
      }

      const counter = document.createElement('div');
      counter.className = 'phase-counter';
      if (currentPhase < totalPhases) counter.classList.add('active');
      counter.textContent = `${currentPhase + 1} / ${totalPhases}`;
      tracker.appendChild(counter);
    }

        if (winners === 0 && unforced === 0) return;

        let analysis = '';
        const ratio = unforced > 0 ? (winners / unforced).toFixed(2) : 'N/A';

        if (winners > unforced) {
          analysis = `Excelente. Tu relación Winners/Errores (${winners}/${unforced} = ${ratio}) es positiva. Jugaste con agresividad controlada. `;
        } else if (winners < unforced * 0.5) {
          analysis = `Tu relación Winners/Errores (${winners}/${unforced} = ${ratio}) indica que cometiste muchos errores no forzados. Prioriza CONSISTENCIA sobre agresión en entrenamientos. `;

        if (firstServe < 50) {
          analysis += `Tu % de primer servicio (${firstServe}%) es bajo. Un saque más confiable te daría muchos más puntos fáciles.`;

                <div class="evolution-category-icon">📉</div>
                <h3 class="evolution-category-title">Balance rápido</h3>
              </div>
              <div class="evolution-items">
                <div class="evolution-item">
                  <div class="evolution-item-label">Concentración / Decisión</div>
                  <div class="evolution-item-value">${sessionData.focus_quality}/10 · ${sessionData.decision_quality}/10</div>
                </div>
                <div class="evolution-item">
                  <div class="evolution-item-label">Emoción / Físico</div>
                  <div class="evolution-item-value">${sessionData.emotional_control}/10 · ${sessionData.physical_readiness}/10</div>
                </div>
              </div>
            </div>
          </div>

          <div class="action-plan-section">
            <h2 class="action-plan-title">🎯 Tu Objetivo Para el Próximo Partido</h2>
            <div class="evolution-item">
              <div class="evolution-item-label">Objetivo Específico</div>
              <div class="evolution-item-value">${sessionData.next_match_goal || 'No especificado'}</div>
            </div>
            <div class="evolution-item" style="margin-top: 1.5rem;">
              <div class="evolution-item-label">Métrica de Éxito</div>
              <div class="evolution-item-value">${sessionData.success_metric || 'No especificado'}</div>
            </div>

            <div class="commitment-box">
              <div class="commitment-label">${config.commitment_prompt || defaultConfig.commitment_prompt}</div>
              <textarea class="textarea-input" id="commitmentInput" placeholder="Escribe tu compromiso específico aquí...">${sessionData.commitment}</textarea>
            </div>
          </div>

          <div class="final-message-box">
            ${(config.final_message || defaultConfig.final_message).replace(/\n/g, '<br>')}
            <span class="final-cta">Ahora, a ejecutar. 🔥</span>
          </div>

          <div class="button-group">
            <button class="primary-btn" id="newAnalysis">🔄 Nuevo Análisis</button>
            <button class="secondary-btn" id="viewHistory">📚 Ver Historial</button>
          </div>
        </div>
      `;

      document.getElementById('commitmentInput').addEventListener('blur', (e) => {
        sessionData.commitment = e.target.value;
      });

      document.getElementById('newAnalysis').onclick = () => {
        sessionData = {
          match_date: '',
          opponent_level: '',
          match_result: '',
          score: '',
          surface: '',
          pre_match_emotion: '',
          pre_match_intensity: 5,
          pre_match_plan: '',
          dominant_emotion: '',
          emotion_intensity: 5,
          emotion_trigger: '',
          mental_strength: '',
          mental_strength_context: '',
          technical_strength: '',
          technical_strength_context: '',
          tactical_strength: '',
          tactical_strength_context: '',
          turning_point_moment: '',
          turning_point_decision: '',
          turning_point_why: '',
          turning_point_learning: '',
          error_pattern: '',
          error_pattern_frequency: 5,
          error_pattern_situation: '',
          error_pattern_cause: '',
          success_pattern: '',
          success_pattern_frequency: 5,
          success_pattern_setup: '',
          opponent_weakness: '',
          opponent_weakness_exploitation: '',
          missed_opportunity: '',
          key_stat_winners: 0,
          key_stat_unforced: 0,
          key_stat_first_serve: 0,
          key_stat_break_points: '',
          energy_level_start: 5,
          energy_level_end: 5,
          focus_quality: 5,
          decision_quality: 5,
          emotional_control: 5,
          physical_readiness: 5,
          technical_focus: '',
          technical_drill: '',
          tactical_focus: '',
          tactical_scenario: '',
          mental_focus: '',
          mental_exercise: '',
          physical_focus: '',
          physical_work: '',
          main_strength: '',
          main_strength_context: '',
          main_priority_area: '',
          main_priority_label: '',
          main_priority_plan: '',
          support_priority_label: '',
          support_priority_plan: '',
          next_match_goal: '',
          success_metric: '',
          commitment: ''
        };
        document.getElementById('progressBar').style.width = '0%';
        document.getElementById('phaseTracker').style.display = 'flex';
        renderWelcome();
        acScrollToTop();
      };

      document.getElementById('viewHistory').onclick = () => {
        showHistory();
        acScrollToTop();
      };

      acScrollToTop();
    }

    function showHistory() {
      const content = document.getElementById('content');
      const sortedAnalyses = [...allAnalyses].sort((a, b) => new Date(b.match_date) - new Date(a.match_date));

      if (sortedAnalyses.length === 0) {
        content.innerHTML = `
          <div style="text-align: center; padding: 3rem;">
            <span style="font-size: 4rem; display: block; margin-bottom: 1rem;">📊</span>
            <h2 style="color: #f1f5f9; margin-bottom: 1rem;">Aún no tienes análisis guardados</h2>
            <p class="subtitle">Completa tu primer análisis para empezar a rastrear tu evolución</p>
            <button class="primary-btn" onclick="location.reload()" style="margin-top: 2rem;">Comenzar Primer Análisis</button>
          </div>
        `;
        return;
      }

      let historyHTML = `
        <div style="margin-bottom: 3rem;">
          <h2 style="font-size: 2.25rem; font-weight: 800; color: #f1f5f9; margin-bottom: 0.5rem;">📚 Tu Historial de Evolución</h2>
          <p class="subtitle">Cada análisis es un paso hacia tu mejor versión</p>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value">${sortedAnalyses.length}</div>
            <div class="stat-label">Total Análisis</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${sortedAnalyses.filter(a => a.match_result === 'Victoria').length}</div>
            <div class="stat-label">Victorias</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${sortedAnalyses.filter(a => a.match_result === 'Derrota').length}</div>
            <div class="stat-label">Derrotas</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${(sortedAnalyses.reduce((sum, a) => sum + (a.focus_quality || 0), 0) / sortedAnalyses.length).toFixed(1)}</div>
            <div class="stat-label">Promedio Enfoque</div>
          </div>
        </div>

        <div style="display: grid; gap: 1.5rem; margin-top: 3rem;">
      `;

      sortedAnalyses.forEach((analysis) => {
        const date = new Date(analysis.match_date);
        const formattedDate = date.toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });
        const resultColor = analysis.match_result === 'Victoria' ? '#10b981' : '#ef4444';
        const resultIcon = analysis.match_result === 'Victoria' ? '🏆' : '💪';

        historyHTML += `
          <div style="background: rgba(30, 41, 59, 0.6); border-radius: 20px; padding: 2rem; border-left: 5px solid ${resultColor}; transition: all 0.3s ease; cursor: pointer;" onmouseover="this.style.background='rgba(30, 41, 59, 0.9)'" onmouseout="this.style.background='rgba(30, 41, 59, 0.6)'">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem;">
              <div>
                <div style="font-size: 1.5rem; margin-bottom: 0.5rem;">${resultIcon}</div>
                <div style="font-size: 0.85rem; color: #64748b; margin-bottom: 0.5rem;">📅 ${formattedDate}</div>
                <div style="font-size: 1.25rem; font-weight: 700; color: #f1f5f9;">${analysis.match_result}: ${analysis.score}</div>
                <div style="font-size: 0.9rem; color: #94a3b8; margin-top: 0.25rem;">🎾 ${analysis.surface} · Rival ${analysis.opponent_level}</div>
              </div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem;">
              <div>
                <div style="font-size: 0.8rem; color: #64748b; text-transform: uppercase; margin-bottom: 0.25rem;">Enfoque Mental</div>
                <div style="color: #cbd5e1; font-size: 0.95rem;">${analysis.main_priority_label || analysis.mental_focus || 'Sin foco guardado'}</div>
              </div>
              <div>
                <div style="font-size: 0.8rem; color: #64748b; text-transform: uppercase; margin-bottom: 0.25rem;">Enfoque Técnico</div>
                <div style="color: #cbd5e1; font-size: 0.95rem;">${analysis.main_strength || analysis.technical_focus || 'Sin lectura guardada'}</div>
              </div>
              <div>
                <div style="font-size: 0.8rem; color: #64748b; text-transform: uppercase; margin-bottom: 0.25rem;">Patrón de Éxito</div>
                <div style="color: #cbd5e1; font-size: 0.95rem;">${analysis.support_priority_label || analysis.success_pattern || 'Sin apoyo guardado'}</div>
              </div>
              <div>
                <div style="font-size: 0.8rem; color: #64748b; text-transform: uppercase; margin-bottom: 0.25rem;">Objetivo Próximo Partido</div>
                <div style="color: #cbd5e1; font-size: 0.95rem;">${analysis.next_match_goal || 'No especificado'}</div>
              </div>
            </div>
          </div>
        `;
      });

      historyHTML += `
        </div>
        <div class="button-group" style="margin-top: 3rem;">
          <button class="primary-btn" id="backBtn">← Volver</button>
        </div>
      `;

      content.innerHTML = historyHTML;
      document.getElementById('backBtn').onclick = () => {
        showSummary();
        acScrollToTop();
      };
      acScrollToTop();
    }

    const dataHandler = {
      onDataChanged(data) {
        allAnalyses = data;
      }
    };

    async function onConfigChange(config) {
      const baseFont = config.font_family || defaultConfig.font_family;
      const baseFontStack = 'Inter, -apple-system, BlinkMacSystemFont, sans-serif';
      const baseSize = config.font_size || defaultConfig.font_size;

      document.body.style.fontFamily = `${baseFont}, ${baseFontStack}`;
      document.body.style.fontSize = `${baseSize}px`;

      const gradient = `linear-gradient(135deg, ${config.background_color || defaultConfig.background_color} 0%, ${config.surface_color || defaultConfig.surface_color} 50%, ${config.background_color || defaultConfig.background_color} 100%)`;
      document.body.style.background = gradient;

      const h1Elements = document.querySelectorAll('h1, .summary-title');
      h1Elements.forEach(h1 => {
        h1.style.fontSize = `${baseSize * 2.75}px`;
      });

      const h2Elements = document.querySelectorAll('h2, .phase-title');
      h2Elements.forEach(h2 => {
        h2.style.fontSize = `${baseSize * 2.5}px`;
      });

      const buttons = document.querySelectorAll('.primary-btn');
      buttons.forEach(btn => {
        btn.style.background = `linear-gradient(135deg, ${config.primary_action_color || defaultConfig.primary_action_color}, ${config.primary_action_color || defaultConfig.primary_action_color})`;
      });

      const progressBar = document.getElementById('progressBar');
      if (progressBar) {
        progressBar.style.background = `linear-gradient(90deg, ${config.primary_action_color || defaultConfig.primary_action_color}, #8b5cf6, #ec4899)`;
      }
    }

    async function init() {
      createParticles();

      if (window.dataSdk) {
        const initResult = await window.dataSdk.init(dataHandler);
        if (!initResult.isOk) {
          console.error('Error al inicializar Data SDK');
        }
      }

      if (window.elementSdk) {
        window.elementSdk.init({
          defaultConfig,
          onConfigChange,
          mapToCapabilities: (config) => ({
            recolorables: [
              {
                get: () => config.background_color || defaultConfig.background_color,
                set: (value) => {
                  config.background_color = value;
                  window.elementSdk.setConfig({ background_color: value });
                }
              },
              {
                get: () => config.surface_color || defaultConfig.surface_color,
                set: (value) => {
                  config.surface_color = value;
                  window.elementSdk.setConfig({ surface_color: value });
                }
              },
              {
                get: () => config.text_color || defaultConfig.text_color,
                set: (value) => {
                  config.text_color = value;
                  window.elementSdk.setConfig({ text_color: value });
                }
              },
              {
                get: () => config.primary_action_color || defaultConfig.primary_action_color,
                set: (value) => {
                  config.primary_action_color = value;
                  window.elementSdk.setConfig({ primary_action_color: value });
                }
              },
              {
                get: () => config.accent_color || defaultConfig.accent_color,
                set: (value) => {
                  config.accent_color = value;
                  window.elementSdk.setConfig({ accent_color: value });
                }
              }
            ],
            borderables: [],
            fontEditable: {
              get: () => config.font_family || defaultConfig.font_family,
              set: (value) => {
                config.font_family = value;
                window.elementSdk.setConfig({ font_family: value });
              }
            },
            fontSizeable: {
              get: () => config.font_size || defaultConfig.font_size,
              set: (value) => {
                config.font_size = value;
                window.elementSdk.setConfig({ font_size: value });
              }
            }
          }),
          mapToEditPanelValues: (config) => new Map([
            ["game_title", config.game_title || defaultConfig.game_title],
            ["welcome_subtitle", config.welcome_subtitle || defaultConfig.welcome_subtitle],
            ["phase1_title", config.phase1_title || defaultConfig.phase1_title],
            ["phase2_title", config.phase2_title || defaultConfig.phase2_title],
            ["phase3_title", config.phase3_title || defaultConfig.phase3_title],
            ["phase4_title", config.phase4_title || defaultConfig.phase4_title],
            ["phase5_title", config.phase5_title || defaultConfig.phase5_title],
            ["final_message", config.final_message || defaultConfig.final_message],
            ["commitment_prompt", config.commitment_prompt || defaultConfig.commitment_prompt]
          ])
        });
      }

      renderWelcome();
    }

    init();
  </script>
<!-- AC_SCROLL_HELPERS_START -->
<script>
  function acScrollToTop() {
    try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch (e) { window.scrollTo(0, 0); }
  }

  function acScrollToElement(id, offset) {
    var target = document.getElementById(id);
    if (!target) { acScrollToTop(); return; }
    var top = target.getBoundingClientRect().top + window.pageYOffset - (offset || 24);
    try { window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' }); } catch (e) { window.scrollTo(0, Math.max(0, top)); }
  }

  document.addEventListener('DOMContentLoaded', function () { window.scrollTo(0, 0); });
</script>
<!-- AC_SCROLL_HELPERS_END -->
</body>
</html>
