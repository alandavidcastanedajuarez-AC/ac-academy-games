<!doctype html>
<html lang="es" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contrato Deportivo Personal</title>
  <style>
    body {
      box-sizing: border-box;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .fade-in {
      animation: fadeIn 0.6s ease-out forwards;
    }
    
    .slide-in {
      animation: slideIn 0.5s ease-out forwards;
    }
    
    .option-card {
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .option-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.15);
    }
    
    .option-card.selected {
      border-width: 3px;
    }
    
    .contract-signature {
      font-family: 'Brush Script MT', cursive;
      font-size: 2rem;
    }

    .mobile-screen {
      min-height: 100vh;
      display: block;
      padding: 1.25rem 1rem 2rem;
      background: linear-gradient(135deg, var(--bg-color, #0f172a) 0%, #1e293b 100%);
    }

    .mobile-shell {
      max-width: 960px;
      margin: 0 auto;
    }

    .mobile-card {
      border-radius: 24px;
      padding: 1.25rem;
    }

    .mobile-stack > * + * {
      margin-top: 1rem;
    }

    .phase-options-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }

    .mobile-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.85rem;
      justify-content: center;
    }

    .mobile-note {
      font-size: 0.95rem;
      opacity: 0.78;
      line-height: 1.5;
    }

    @media (max-width: 768px) {
      .mobile-screen {
        padding: 1rem 0.85rem 1.6rem;
      }

      .mobile-card {
        border-radius: 20px;
        padding: 1rem;
      }

      .phase-options-grid,
      .contract-grid,
      .date-grid {
        grid-template-columns: 1fr !important;
      }

      .mobile-actions {
        flex-direction: column;
      }

      .mobile-actions button {
        width: 100%;
      }

      .compact-copy {
        font-size: 0.98rem !important;
        line-height: 1.55 !important;
      }
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
 
<!-- AC_PHASE1_HELPERS_START -->
<style>
  .hidden { display: none !important; }
  .text-center, .center { text-align: center !important; }

  @media (max-width: 768px) {
    body { font-size: 16px; }
    .container, .game-container, .game-wrapper, .app-wrapper, .app-container, .main-wrapper, .stage-wrapper, .phase-container, .phase-card, .content, .content-area, .modal-content, .results-card, .scene, .phase-content { padding: 16px !important; }
    h1, .main-title, .game-title, .title { font-size: clamp(1.8rem, 7vw, 2.3rem) !important; line-height: 1.15 !important; }
    h2, .phase-title, .stage-title, .final-title, .section-title { font-size: clamp(1.3rem, 6vw, 1.7rem) !important; line-height: 1.25 !important; }
    h3, .subtitle, .game-subtitle, .phase-subtitle, .question-label { font-size: clamp(1rem, 4.5vw, 1.15rem) !important; line-height: 1.4 !important; }
    p, li, .instruction, .phase-description, .phase-instruction, .scenario-description, .principle-text, .intro-message, .quote { font-size: 1rem !important; line-height: 1.55 !important; }
    .button-group, .action-buttons, .final-buttons, .controls-row { flex-direction: column !important; gap: 12px !important; }
    button, .btn, .btn-primary, .btn-secondary, .action-button, .option-btn { width: 100% !important; }
    .zone-grid, .scenario-grid, .options-grid, .results-stats { grid-template-columns: 1fr !important; }
  }
</style>
<script>
  window.elementSdk = window.elementSdk || { init: async function () { return { isOk: true, value: null }; }, on: function () {}, emit: function () { return { isOk: true, value: null }; }, setConfig: function () {}, config: {} };
  window.dataSdk = window.dataSdk || { init: async function () { return { isOk: true, value: null }; }, create: async function () { return { isOk: true, value: null }; }, list: async function () { return { isOk: true, value: [] }; }, update: async function () { return { isOk: true, value: null }; } };
</script>
<!-- AC_PHASE1_HELPERS_END -->
</head>

    function render() {
      const container = document.getElementById('game-container');
      const config = window.elementSdk?.config || defaultConfig;
      
      if (gameState.phase === 'welcome') {
        container.innerHTML = renderWelcome(config);
      } else if (gameState.phase === 'name') {
        container.innerHTML = renderNameInput(config);
      } else if (gameState.phase === 'contract') {
        container.innerHTML = renderContract(config);
      } else if (gameState.phase === 'final') {
        container.innerHTML = renderFinalMessage(config);
      } else if (gameState.phase === 'recommendations') {
        container.innerHTML = renderRecommendations(config);
      } else if (gameState.phase.startsWith('phase')) {
        container.innerHTML = renderPhase(config);
      }
      
      attachEventListeners();
    }

    function renderWelcome(config) {
      const phase = phases.welcome;
      return `

            <div class="text-center" style="margin-bottom: 1.5rem;">

                Comenzar contrato
              </button>
            </div>
          </div>
        </div>
      `;
    }

              </h2>

              <label for="player-name" class="block text-lg font-semibold mb-3" style="color: ${config.text_color};">
                Tu nombre completo
              </label>
              <input 
                type="text" 
                id="player-name" 
                placeholder="Escribe tu nombre aquí"
                class="w-full px-6 py-4 rounded-xl text-lg mb-2"

    function renderPhase(config) {
      let phaseKey = gameState.phase;
      const phase = phases[phaseKey];

      endDate.setDate(endDate.getDate() + durationDays[gameState.duration]);

        month: 'long',

                      Etapa: ${getLabelForValue('phase1', gameState.currentStage)}

                </div>

                  <p class="text-sm uppercase tracking-wide mb-3" style="color: ${config.accent_color}; font-weight: 600;">
                    🎯 ENFOQUE PRINCIPAL
                  </p>
                  <p class="text-xl font-semibold" style="color: ${config.text_color};">
                    ${getLabelForValue('phase2', gameState.mainFocus)}
                  </p>
                  <p class="text-sm mt-2" style="color: ${config.text_color}; opacity: 0.7;">
                    ${getDescriptionForValue('phase2', gameState.mainFocus)}

                  </p>
                  <div class="space-y-4">
                    <div class="flex items-start border-l-4 pl-4" style="border-color: ${config.primary_color};">
                      <span class="text-3xl mr-3">🎯</span>
                      <div>
                        <p class="font-bold text-lg" style="color: ${config.text_color};">Compromiso Técnico</p>
                        <p class="text-md" style="color: ${config.text_color}; opacity: 0.9;">
                          ${getLabelForValue('phase3_technical', gameState.technicalCommitment)}
                        </p>
                      </div>
                    </div>
                    <div class="flex items-start border-l-4 pl-4" style="border-color: ${config.primary_color};">
                      <span class="text-3xl mr-3">🧠</span>
                      <div>
                        <p class="font-bold text-lg" style="color: ${config.text_color};">Compromiso Mental</p>
                        <p class="text-md" style="color: ${config.text_color}; opacity: 0.9;">
                          ${getLabelForValue('phase3_mental', gameState.mentalCommitment)}
                        </p>
                      </div>
                    </div>
                    <div class="flex items-start border-l-4 pl-4" style="border-color: ${config.primary_color};">
                      <span class="text-3xl mr-3">💪</span>
                      <div>
                        <p class="font-bold text-lg" style="color: ${config.text_color};">Compromiso Físico</p>
                        <p class="text-md" style="color: ${config.text_color}; opacity: 0.9;">

                      </div>
                    </div>
                  </div>
                </div>
                
                <div class="rounded-xl p-5" style="background-color: ${config.background_color};">
                  <p class="text-sm uppercase tracking-wide mb-3" style="color: ${config.accent_color}; font-weight: 600;">

    }

      const commitmentRecs = {

      const mentalAdvice = {
        respirar: "Respira 3 veces profundo antes de sacar o restar: inhala 4 segundos, exhala 6. Activa el sistema parasimpático.",

      const principleKey = `${gameState.currentStage}_${gameState.mainFocus}`;

    }

    function getLabelForValue(phaseKey, value) {
      const phase = phases[phaseKey];
      if (!phase || !phase.options) return value;
      const option = phase.options.find(opt => opt.value === value);
      return option ? option.label : value;
    }

    function getDescriptionForValue(phaseKey, value) {
      const phase = phases[phaseKey];
      if (!phase || !phase.options) return '';
      const option = phase.options.find(opt => opt.value === value);
      return option ? option.description : '';
    }

    function attachEventListeners() {
      const startBtn = document.getElementById('start-btn');
      if (startBtn) {
        startBtn.onclick = () => {
          gameState.phase = 'name';
          render();
          acScrollToTop();
        };
      }
      
      const continueNameBtn = document.getElementById('continue-name-btn');
      if (continueNameBtn) {
        continueNameBtn.onclick = handleNameSubmit;
      }
      
      const nameInput = document.getElementById('player-name');
      if (nameInput) {
        nameInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            handleNameSubmit();
          }
        });
      }
      
      const optionCards = document.querySelectorAll('.option-card');
      optionCards.forEach(card => {
        card.onclick = () => handleOptionSelect(card.dataset.value);
      });
      
      const signBtn = document.getElementById('sign-btn');
      if (signBtn) {
        signBtn.onclick = handleSign;
      }
      
      const resetBtn = document.getElementById('reset-btn');
      if (resetBtn) {
        resetBtn.onclick = resetGame;
      }
      
      const recommendationsBtn = document.getElementById('recommendations-btn');
      if (recommendationsBtn) {
        recommendationsBtn.onclick = () => {
          gameState.phase = 'recommendations';
          render();
          acScrollToTop();
        };
      }
      
      const backToSummaryBtn = document.getElementById('back-to-summary-btn');
      if (backToSummaryBtn) {
        backToSummaryBtn.onclick = () => {
          gameState.phase = 'final';
          render();
          acScrollToTop();
        };
      }
      
      const resetFromRecBtn = document.getElementById('reset-from-rec-btn');
      if (resetFromRecBtn) {
        resetFromRecBtn.onclick = resetGame;
      }
    }

    function handleNameSubmit() {
      const input = document.getElementById('player-name');
      const errorMsg = document.getElementById('name-error');
      
      if (input && input.value.trim().length >= 3) {
        gameState.playerName = input.value.trim();
        gameState.phase = 'phase1';
        render();
        acScrollToTop();
      } else {
        if (errorMsg) {
          errorMsg.classList.remove('hidden');
        }
        if (input) {
          input.style.borderColor = '#ef4444';
        }
      }
    }

    function handleOptionSelect(value) {
      const currentPhase = gameState.phase;
      
      if (currentPhase === 'phase1') {
        gameState.currentStage = value;
        setTimeout(() => {
          gameState.phase = 'phase2';
          render();
          acScrollToTop();
        }, 300);
      } else if (currentPhase === 'phase2') {
        gameState.mainFocus = value;
        setTimeout(() => {
          gameState.phase = 'phase3_technical';
          render();
          acScrollToTop();
        }, 300);
      } else if (currentPhase === 'phase3_technical') {
        gameState.technicalCommitment = value;
        setTimeout(() => {
          gameState.phase = 'phase3_mental';
          render();
          acScrollToTop();
        }, 300);
      } else if (currentPhase === 'phase3_mental') {
        gameState.mentalCommitment = value;
        setTimeout(() => {
          gameState.phase = 'phase3_physical';
          render();
          acScrollToTop();
        }, 300);
      } else if (currentPhase === 'phase3_physical') {
        gameState.physicalCommitment = value;
        setTimeout(() => {
          gameState.phase = 'phase4';
          render();
          acScrollToTop();
        }, 300);
      } else if (currentPhase === 'phase4') {
        gameState.duration = value;
        setTimeout(() => {
          gameState.phase = 'contract';
          render();
          acScrollToTop();
        }, 300);
      }
    }

    async function handleSign() {
      const btn = document.getElementById('sign-btn');
      if (!btn) return;
      
      btn.disabled = true;
      btn.textContent = 'Guardando contrato...';
      btn.style.opacity = '0.6';
      
      const contractData = {
        player_name: gameState.playerName,
        current_stage: gameState.currentStage,
        main_focus: gameState.mainFocus,
        technical_commitment: gameState.technicalCommitment,
        mental_commitment: gameState.mentalCommitment,
        physical_commitment: gameState.physicalCommitment,
        duration: gameState.duration,
        signed_date: new Date().toISOString()
      };
      
      const result = await window.dataSdk.create(contractData);
      
      if (result.isOk) {
        gameState.phase = 'final';
        render();
        acScrollToTop();
      } else {
        btn.disabled = false;
        btn.textContent = '✍️ Firmar mi contrato';
        btn.style.opacity = '1';
        
        const container = document.getElementById('game-container');
        const errorDiv = document.createElement('div');
        errorDiv.className = 'fixed top-4 right-4 bg-red-500 text-white px-6 py-4 rounded-lg shadow-lg';
        errorDiv.textContent = 'Error al guardar. Intenta nuevamente.';
        container.appendChild(errorDiv);
        setTimeout(() => errorDiv.remove(), 3000);
      }
    }

    function resetGame() {
      gameState = {
        phase: 'welcome',
        playerName: '',
        currentStage: '',
        mainFocus: '',
        technicalCommitment: '',
        mentalCommitment: '',
        physicalCommitment: '',
        duration: ''
      };
      render();
      acScrollToTop();
    }

    const dataHandler = {
      onDataChanged(data) {
        console.log('Contratos guardados:', data.length);
      }
    };

    async function initializeApp() {
      if (window.dataSdk) {
        const initResult = await window.dataSdk.init(dataHandler);
        if (!initResult.isOk) {
          console.error('Error initializing data SDK');
        }
      }
      
      if (window.elementSdk) {
        await window.elementSdk.init({
          defaultConfig,
          onConfigChange: async (config) => {
            render();
          },
          mapToCapabilities: (config) => ({
            recolorables: [
              {
                get: () => config.background_color || defaultConfig.background_color,
                set: (value) => {
                  config.background_color = value;
                  window.elementSdk.setConfig({ background_color: value });
                }
              },
              {
                get: () => config.card_color || defaultConfig.card_color,
                set: (value) => {
                  config.card_color = value;
                  window.elementSdk.setConfig({ card_color: value });
                }
              },
              {
                get: () => config.primary_color || defaultConfig.primary_color,
                set: (value) => {
                  config.primary_color = value;
                  window.elementSdk.setConfig({ primary_color: value });
                }
              },
              {
                get: () => config.text_color || defaultConfig.text_color,
                set: (value) => {
                  config.text_color = value;
                  window.elementSdk.setConfig({ text_color: value });
                }
              },
              {
                get: () => config.accent_color || defaultConfig.accent_color,
                set: (value) => {
                  config.accent_color = value;
                  window.elementSdk.setConfig({ accent_color: value });
                }
              }
            ],
            borderables: [],
            fontEditable: undefined,
            fontSizeable: undefined
          }),
          mapToEditPanelValues: (config) => new Map([
            ["game_title", config.game_title || defaultConfig.game_title],
            ["welcome_message", config.welcome_message || defaultConfig.welcome_message]
          ])
        });
      }
      
      render();
    }

    initializeApp();
  </script>
<!-- AC_SCROLL_HELPERS_START -->
<script>
  function acScrollToTop() {
    try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch (e) { window.scrollTo(0, 0); }
  }

  function acScrollToElement(id, offset) {
    var target = document.getElementById(id);
    if (!target) { acScrollToTop(); return; }
    var top = target.getBoundingClientRect().top + window.pageYOffset - (offset || 24);
    try { window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' }); } catch (e) { window.scrollTo(0, Math.max(0, top)); }
  }

  document.addEventListener('DOMContentLoaded', function () { window.scrollTo(0, 0); });
</script>
<!-- AC_SCROLL_HELPERS_END -->
