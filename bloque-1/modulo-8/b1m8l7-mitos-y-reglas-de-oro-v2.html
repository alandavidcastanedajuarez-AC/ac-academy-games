    const dataHandler = {
      onDataChanged(data) {
        currentRecords = data;
      }
    };

    async function saveProgress() {
      if (currentRecords.length >= 999) {
        showToast("Límite de 999 registros alcanzado", false);
        return;
      }

      const result = await window.dataSdk.create({
        player_name: "Jugador",
        myths_score: gameState.mythsScore,
        scenarios_score: gameState.scenariosScore,
        completed_at: new Date().toISOString()
      });

      if (result.isOk) {
        showToast("Progreso guardado", true);
      } else {
        showToast("Error al guardar progreso", false);
      }
    }

    function showToast(message, success) {
      const toast = document.createElement('div');
      toast.className = 'fade-in';
      toast.style.cssText = `
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 9999;
        max-width: min(320px, calc(100vw - 32px));
        padding: 14px 18px;
        border-radius: 16px;
        color: #fff;
        font-weight: 600;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.28);
        background: ${success ? '#16a34a' : '#dc2626'};
      `;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function safeCopy(value, fallback) {
      if (typeof value !== 'string') {
        return fallback;
      }

      const normalized = value.trim();
      if (!normalized || normalized.toLowerCase() === 'undefined' || normalized.toLowerCase() === 'null') {
        return fallback;
      }

      return normalized;
    }

      `;
    }

    function renderMythsScreen() {
      const config = window.elementSdk?.config || defaultConfig;
      const baseFont = config.font_size || defaultConfig.font_size;
      const customFont = config.font_family || defaultConfig.font_family;
      const baseFontStack = 'Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
      const currentMyth = myths[gameState.currentMyth];
      const isRevealed = gameState.revealedMyths.includes(gameState.currentMyth);
      const block1Title = safeCopy(config.block1_title, defaultConfig.block1_title);
      
      return `
        <div class="min-h-full screen-shell" style="background-color: ${config.background_color};">
          <div class="max-w-3xl mx-auto">
            <div class="mb-8 text-center fade-in">
              <div class="text-4xl mb-3">🟦</div>
              <h2 class="text-3xl font-bold mb-2" style="color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 1.8}px;">
                ${block1Title}
              </h2>
              <p class="opacity-80" style="color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont}px;">
                Identifica creencias falsas
              </p>
              <div class="mt-4" style="color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 0.9}px;">
                Mito ${gameState.currentMyth + 1} de ${myths.length} | Puntuación: ${gameState.mythsScore}/${gameState.revealedMyths.length}
              </div>
            </div>

            <div class="card-flip ${isRevealed ? 'flipped' : ''}" style="position: relative; min-height: 400px;">
              <div class="card-front p-8 rounded-xl shadow-2xl block-card" style="background-color: ${config.surface_color};">
                <div class="text-center mb-8">
                  <div class="text-5xl mb-4">🧠</div>
                  <h3 class="text-2xl font-bold mb-6" style="color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 1.5}px;">
                    "${currentMyth.statement}"
                  </h3>
                </div>
                <div class="duo-grid">
                  <button onclick="answerMyth(true)" class="p-6 rounded-lg font-bold text-xl transition-all hover:scale-105 cta-button" style="background-color: ${config.primary_action_color}; color: ${config.background_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 1.2}px;">
                    ❌ MITO
                  </button>
                  <button onclick="answerMyth(false)" class="p-6 rounded-lg font-bold text-xl transition-all hover:scale-105 cta-button" style="background-color: ${config.secondary_action_color}; color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 1.2}px;">
                    ✔ REALIDAD
                  </button>
                </div>
              </div>

              <div class="card-back p-8 rounded-xl shadow-2xl block-card" style="background-color: ${config.surface_color};">
                <div class="text-center mb-6">
                  <div class="text-5xl mb-4">💡</div>
                  <div class="text-2xl font-bold mb-4" style="color: ${config.primary_action_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 1.5}px;">
                    Verdad Aplicada
                  </div>
                  <p class="text-xl leading-relaxed mb-4 font-semibold" style="color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 1.2}px;">
                    ${currentMyth.explanation}
                  </p>
                  <div class="p-5 rounded-lg mb-6 text-left" style="background-color: ${config.background_color};">
                    <div class="text-base leading-relaxed opacity-90" style="color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont}px;">
                      ${currentMyth.detailedInfo}
                    </div>
                  </div>
                  <div class="p-3 rounded-lg" style="background-color: ${config.secondary_action_color}30; border-left: 4px solid ${config.secondary_action_color};">
                    <div class="text-xs font-semibold mb-1 uppercase tracking-wide" style="color: ${config.secondary_action_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 0.75}px;">
                      📚 Conexión al módulo
                    </div>
                    <div class="text-sm font-medium" style="color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 0.85}px;">
                      ${currentMyth.connection}
                    </div>
                  </div>
                </div>
                ${gameState.currentMyth < myths.length - 1 ? 
                  `<button onclick="nextMyth()" class="w-full p-4 rounded-lg font-bold text-lg transition-all hover:scale-105 cta-button" style="background-color: ${config.primary_action_color}; color: ${config.background_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 1.1}px;">
                    Siguiente Mito →
                  </button>` :
                  `<button onclick="goToScenarios()" class="w-full p-4 rounded-lg font-bold text-lg transition-all hover:scale-105 cta-button" style="background-color: ${config.primary_action_color}; color: ${config.background_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 1.1}px;">
                    Aplicar la Verdad →
                  </button>`
                }
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderScenariosScreen() {
      const config = window.elementSdk?.config || defaultConfig;
      const baseFont = config.font_size || defaultConfig.font_size;
      const customFont = config.font_family || defaultConfig.font_family;
      const baseFontStack = 'Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
      const currentScenario = scenarios[gameState.currentScenario];
      const isCompleted = gameState.completedScenarios.includes(gameState.currentScenario);
      const block2Title = safeCopy(config.block2_title, defaultConfig.block2_title);
      
      return `
        <div class="min-h-full screen-shell" style="background-color: ${config.background_color};">
          <div class="max-w-3xl mx-auto">
            <div class="mb-8 text-center fade-in">
              <div class="text-4xl mb-3">🟩</div>
              <h2 class="text-3xl font-bold mb-2" style="color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 1.8}px;">
                ${block2Title}
              </h2>
              <p class="opacity-80" style="color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont}px;">
                Demuestra tu comprensión
              </p>
              <div class="mt-4" style="color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 0.9}px;">
                Escenario ${gameState.currentScenario + 1} de ${scenarios.length} | Puntuación: ${gameState.scenariosScore}/${gameState.completedScenarios.length}
              </div>
            </div>

            <div class="slide-in">
              <div class="p-8 rounded-xl shadow-2xl mb-6 block-card" style="background-color: ${config.surface_color};">
                <div class="text-center mb-6">
                  <div class="text-5xl mb-4">🎾</div>
                  <h3 class="text-2xl font-bold mb-2" style="color: ${config.primary_action_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 1.5}px;">
                    ${currentScenario.title}
                  </h3>
                  <p class="text-lg" style="color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 1.1}px;">
                    ${currentScenario.question}
                  </p>
                </div>

                <div class="space-y-3" id="scenario-options">
                  ${currentScenario.options.map((option, index) => `
                    <button onclick="answerScenario(${index})" 
                      class="w-full p-4 rounded-lg text-left transition-all hover:scale-102 ${isCompleted ? 'cursor-not-allowed opacity-60' : ''}"
                      style="background-color: ${config.background_color}; color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont}px; ${isCompleted ? 'pointer-events: none;' : ''}"
                      ${isCompleted ? 'disabled' : ''}>
                      ${option.text}
                    </button>
                  `).join('')}
                </div>

                ${isCompleted ? `
                  <div class="mt-6 space-y-4">
                    <div class="p-4 rounded-lg" style="background-color: ${config.primary_action_color}30; border-left: 4px solid ${config.primary_action_color};">
                      <div class="text-lg font-bold mb-2" style="color: ${config.primary_action_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 1.2}px;">
                        💡 Aprendizaje Clave
                      </div>
                      <p class="font-semibold text-lg mb-3" style="color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 1.1}px;">
                        ${currentScenario.learning}
                      </p>
                      <div class="text-base leading-relaxed opacity-90" style="color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 0.95}px;">
                        ${currentScenario.detailedLearning}
                      </div>
                    </div>
                  </div>
                  ${gameState.currentScenario < scenarios.length - 1 ?
                    `<button onclick="nextScenario()" class="w-full mt-4 p-4 rounded-lg font-bold text-lg transition-all hover:scale-105 cta-button" style="background-color: ${config.primary_action_color}; color: ${config.background_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 1.1}px;">
                      Siguiente Escenario →
                    </button>` :
                    `<button onclick="goToRules()" class="w-full mt-4 p-4 rounded-lg font-bold text-lg transition-all hover:scale-105 cta-button" style="background-color: ${config.primary_action_color}; color: ${config.background_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 1.1}px;">
                      Ver Reglas de Oro →
                    </button>`
                  }
                ` : ''}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderRulesScreen() {
      const config = window.elementSdk?.config || defaultConfig;
      const baseFont = config.font_size || defaultConfig.font_size;
      const customFont = config.font_family || defaultConfig.font_family;
      const baseFontStack = 'Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
      const block3Title = safeCopy(config.block3_title, defaultConfig.block3_title);
      
      return `
        <div class="min-h-full screen-shell" style="background-color: ${config.background_color};">
          <div class="max-w-3xl mx-auto">
            <div class="mb-8 text-center fade-in">
              <div class="text-4xl mb-3">🟨</div>
              <h2 class="text-3xl font-bold mb-6" style="color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 1.8}px;">
                ${block3Title}
              </h2>
            </div>

            <div class="space-y-4 mb-8" id="rules-container">
              ${goldenRules.slice(0, gameState.currentRule + 1).map((rule, index) => `
                <div class="p-6 rounded-xl shadow-lg slide-in rule-card" style="background-color: ${config.surface_color}; animation-delay: ${index * 0.1}s;">
                  <div class="flex items-start gap-4 mb-3">
                    <div class="text-4xl flex-shrink-0">${rule.emoji}</div>
                    <div class="flex-1">
                      <p class="text-xl font-bold mb-2" style="color: ${config.primary_action_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 1.3}px;">
                        ${rule.text}
                      </p>
                      <p class="text-base leading-relaxed opacity-90" style="color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 0.95}px;">
                        ${rule.detail}
                      </p>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>

            ${gameState.currentRule < goldenRules.length - 1 ?
              `<div class="text-center">
                <button onclick="showNextRule()" class="px-8 py-4 rounded-lg font-bold text-lg transition-all hover:scale-105 pulse-animation" style="background-color: ${config.primary_action_color}; color: ${config.background_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 1.1}px;">
                  Siguiente Regla →
                </button>
              </div>` :
              `<div class="p-8 rounded-xl shadow-2xl text-center fade-in summary-card" style="background-color: ${config.surface_color};">
                <div class="text-5xl mb-4">🏁</div>
                <h3 class="text-2xl font-bold mb-4" style="color: ${config.primary_action_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 1.5}px;">
                  Los campeones no hacen cosas extraordinarias…
                </h3>
                <p class="text-xl mb-6" style="color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 1.2}px;">
                  hacen lo básico extraordinariamente bien.
                </p>
                <p class="text-lg mb-8 opacity-90" style="color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont * 1.1}px;">
                  Ahora sabes cómo sostener tu rendimiento.
                </p>
                <div class="space-y-3">
                  <button onclick="restartGame()" class="w-full p-4 rounded-lg font-bold transition-all hover:scale-105 cta-button" style="background-color: ${config.primary_action_color}; color: ${config.background_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont}px;">
                    ✔ Repetir Juego
                  </button>
                  <button onclick="saveProgressAndNotify()" class="w-full p-4 rounded-lg font-bold transition-all hover:scale-105 cta-button" style="background-color: ${config.secondary_action_color}; color: ${config.text_color}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseFont}px;">
                    ✔ Guardar Progreso
                  </button>
                </div>
              </div>`
            }
          </div>
        </div>
      `;
    }

    function render(scrollMode) {
      const app = document.getElementById('app');
      
      switch(gameState.currentScreen) {
        case 'welcome':
          app.innerHTML = renderWelcomeScreen();
          break;
        case 'myths':
          app.innerHTML = renderMythsScreen();
          break;
        case 'scenarios':
          app.innerHTML = renderScenariosScreen();
          break;
        case 'rules':
          app.innerHTML = renderRulesScreen();
          break;
      }

      if (scrollMode === 'top' && typeof window.acScrollToTop === 'function') {
        requestAnimationFrame(() => window.acScrollToTop());
      }
    }

    window.startGame = function() {
      gameState.currentScreen = 'myths';
      gameState.currentMyth = 0;
      gameState.mythsScore = 0;
      gameState.revealedMyths = [];
      render('top');
    };

    window.answerMyth = function(isMito) {
      const currentMyth = myths[gameState.currentMyth];
      if (isMito === currentMyth.isMito) {
        gameState.mythsScore++;
      }
      gameState.revealedMyths.push(gameState.currentMyth);
      render();
    };

    window.nextMyth = function() {
      gameState.currentMyth++;
      render('top');
    };

    window.goToScenarios = function() {
      gameState.currentScreen = 'scenarios';
      gameState.currentScenario = 0;
      gameState.scenariosScore = 0;
      gameState.completedScenarios = [];
      render('top');
    };

    window.answerScenario = function(optionIndex) {
      const currentScenario = scenarios[gameState.currentScenario];
      if (currentScenario.options[optionIndex].correct) {
        gameState.scenariosScore++;
      }
      gameState.completedScenarios.push(gameState.currentScenario);
      render();
    };

    window.nextScenario = function() {
      gameState.currentScenario++;
      render('top');
    };

    window.goToRules = function() {
      gameState.currentScreen = 'rules';
      gameState.currentRule = 0;
      render('top');
    };

    window.showNextRule = function() {
      gameState.currentRule++;
      render();
    };

    window.restartGame = function() {
      gameState = {
        currentScreen: 'welcome',
        currentMyth: 0,
        currentScenario: 0,
        currentRule: 0,
        mythsScore: 0,
        scenariosScore: 0,
        revealedMyths: [],
        completedScenarios: []
      };
      render('top');
    };

    window.saveProgressAndNotify = async function() {
      await saveProgress();
    };

    async function onConfigChange(config) {
      render();
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (value) => {
              config.background_color = value;
              window.elementSdk.setConfig({ background_color: value });
            }
          },
          {
            get: () => config.surface_color || defaultConfig.surface_color,
            set: (value) => {
              config.surface_color = value;
              window.elementSdk.setConfig({ surface_color: value });
            }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => {
              config.text_color = value;
              window.elementSdk.setConfig({ text_color: value });
            }
          },
          {
            get: () => config.primary_action_color || defaultConfig.primary_action_color,
            set: (value) => {
              config.primary_action_color = value;
              window.elementSdk.setConfig({ primary_action_color: value });
            }
          },
          {
            get: () => config.secondary_action_color || defaultConfig.secondary_action_color,
            set: (value) => {
              config.secondary_action_color = value;
              window.elementSdk.setConfig({ secondary_action_color: value });
            }
          }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (value) => {
            config.font_family = value;
            window.elementSdk.setConfig({ font_family: value });
          }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: (value) => {
            config.font_size = value;
            window.elementSdk.setConfig({ font_size: value });
          }
        }
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ["game_title", config.game_title || defaultConfig.game_title],
        ["game_subtitle", config.game_subtitle || defaultConfig.game_subtitle],
        ["block1_title", config.block1_title || defaultConfig.block1_title],
        ["block2_title", config.block2_title || defaultConfig.block2_title],
        ["block3_title", config.block3_title || defaultConfig.block3_title],
        ["start_button", config.start_button || defaultConfig.start_button],
        ["continue_button", config.continue_button || defaultConfig.continue_button]
      ]);
    }

    async function init() {
      if (window.dataSdk) {
        const initResult = await window.dataSdk.init(dataHandler);
        if (!initResult.isOk) {
          console.error("Error al inicializar Data SDK");
        }
      }

      if (window.elementSdk) {
        window.elementSdk.init({
          defaultConfig,
          onConfigChange,
          mapToCapabilities,
          mapToEditPanelValues
        });
      }

      render();
    }

    init();
  </script>
<!-- AC_SCROLL_HELPERS_START -->
<script>
  function acScrollToTop() {
    try {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (e) {
      window.scrollTo(0, 0);
    }
  }

  function acScrollToElement(id, offset) {
    var target = document.getElementById(id);
    if (!target) {
      acScrollToTop();
      return;
    }

    var top = target.getBoundingClientRect().top + window.pageYOffset - (offset || 24);

    try {
      window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
    } catch (e) {
      window.scrollTo(0, Math.max(0, top));
    }
  }

  document.addEventListener('DOMContentLoaded', function () {
    window.scrollTo(0, 0);
  });
</script>
<!-- AC_SCROLL_HELPERS_END -->
</body>
</html>
