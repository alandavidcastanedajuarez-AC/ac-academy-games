<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B1M3L6 - Curiosidades del tenis</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Segoe UI", Tahoma, sans-serif; min-height: 100vh; padding: 24px; background: linear-gradient(135deg, #ede9fe, #eff6ff 50%, #f5f3ff); color: #1f2937; }
        .shell { max-width: 980px; margin: 0 auto; background: rgba(255,255,255,.97); border-radius: 28px; padding: 28px; box-shadow: 0 24px 48px rgba(0,0,0,.12); }
        .hero { text-align: center; margin-bottom: 28px; }
        .hero h1 { font-size: clamp(2rem, 4vw, 3rem); margin-bottom: 12px; }
        .hero p { max-width: 760px; margin: 0 auto; line-height: 1.65; color: #5b677a; }
        .score { text-align: center; font-weight: 700; color: #4f46e5; margin-bottom: 16px; }
        .progress { height: 10px; border-radius: 999px; background: #e5e7eb; overflow: hidden; margin-bottom: 22px; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #6366f1, #8b5cf6); transition: width .25s ease; }
        .question { padding: 18px; border-radius: 20px; background: #f8fafc; border: 1px solid #e5e7eb; }
        .question-number { color: #4f46e5; font-weight: 700; margin-bottom: 10px; }
        .question-text { font-size: 1.35rem; line-height: 1.55; color: #0f172a; }
        .options { display: grid; gap: 10px; margin-top: 18px; }
        .option { border: 1px solid #d1d5db; background: #fff; border-radius: 14px; padding: 12px 14px; cursor: pointer; text-align: left; }
        .feedback { display: none; margin-top: 16px; padding: 14px 16px; border-radius: 16px; line-height: 1.6; }
        .feedback.show { display: block; }
        .feedback.good { background: #ecfdf5; color: #166534; border: 1px solid #86efac; }
        .feedback.bad { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
        .actions { margin-top: 16px; display: flex; justify-content: space-between; gap: 12px; }
        .btn { border: none; border-radius: 999px; padding: 12px 18px; font-weight: 700; cursor: pointer; color: #fff; background: linear-gradient(135deg, #6366f1, #8b5cf6); }
        .btn[disabled] { opacity: .45; cursor: not-allowed; }
        .result { display: none; margin-top: 22px; padding: 18px; border-radius: 20px; background: #eef2ff; border: 1px solid #c7d2fe; text-align: center; }
        .result.show { display: block; }
    </style>
</head>
<body>
    <main class="shell">
        <header class="hero">
            <h1>Curiosidades del tenis</h1>
            <p>Responde una trivia breve con datos hist&oacute;ricos, t&eacute;cnicos y culturales. El objetivo es repasar ideas generales del tenis con un tono ligero y claro.</p>
        </header>
        <div class="score" id="scoreText">Puntos: 0/10</div>
        <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
        <section class="question">
            <div class="question-number" id="questionNumber">Pregunta 1 de 10</div>
            <div class="question-text" id="questionText"></div>
            <div class="options" id="options"></div>
            <div class="feedback" id="feedback"></div>
            <div class="actions">
                <button class="btn" type="button" id="nextButton" disabled>Siguiente</button>
                <button class="btn" type="button" id="restartButton">Reiniciar</button>
            </div>
        </section>
        <section class="result" id="result"></section>
    </main>
    <script>
        const questions = [
            { q: "&iquest;Qu&eacute; superficie suele considerarse la m&aacute;s r&aacute;pida en el tenis tradicional?", options: ["Arcilla", "C&eacute;sped", "Dura"], answer: 1, note: "El c&eacute;sped suele favorecer botes bajos y puntos m&aacute;s cortos." },
            { q: "&iquest;Para qu&eacute; sirve el split step?", options: ["Preparar la reacci&oacute;n", "Cambiar de empu&ntilde;adura", "Pedir la pelota"], answer: 0, note: "El split step activa piernas y equilibrio antes del golpe rival." },
            { q: "&iquest;Qu&eacute; color se populariz&oacute; para las pelotas por visibilidad televisiva?", options: ["Azul", "Amarillo", "Rojo"], answer: 1, note: "La pelota amarilla se volvi&oacute; una referencia visual del tenis moderno." },
            { q: "&iquest;Qu&eacute; torneo se asocia con una fuerte tradici&oacute;n de vestimenta blanca?", options: ["Wimbledon", "US Open", "Roland Garros"], answer: 0, note: "Wimbledon conserva esa identidad como parte de su tradici&oacute;n." },
            { q: "&iquest;Qu&eacute; golpe se relaciona m&aacute;s con el cierre en la red?", options: ["Volea", "Globo", "Slice defensivo"], answer: 0, note: "La volea permite atacar antes de que la pelota bote." },
            { q: "&iquest;Qu&eacute; palabra del marcador representa cero?", options: ["Let", "Love", "Break"], answer: 1, note: "Love se usa para indicar cero en el puntaje." },
            { q: "&iquest;Qu&eacute; tipo de empu&ntilde;adura se vincula mucho con una derecha moderna de topspin?", options: ["Continental", "Semi-western", "Eastern"], answer: 1, note: "La semi-western se asocia mucho con la derecha actual." },
            { q: "&iquest;Qu&eacute; zona de la cancha suele usarse para construir el punto con paciencia?", options: ["Fondo", "Red", "Pasillo de dobles"], answer: 0, note: "Desde el fondo se organiza gran parte del intercambio." },
            { q: "&iquest;Qu&eacute; parte del juego exige mucha lectura emocional y concentraci&oacute;n?", options: ["Solo el saque", "Solo el rev&eacute;s", "Todo el partido"], answer: 2, note: "La mente acompa&ntilde;a cada fase del juego, no solo un golpe." },
            { q: "&iquest;Qu&eacute; idea resume mejor el tenis competitivo?", options: ["Solo potencia", "T&eacute;cnica, decisi&oacute;n y control", "Suerte y velocidad"], answer: 1, note: "El tenis combina t&eacute;cnica, lectura t&aacute;ctica y manejo emocional." }
        ];
        let index = 0;
        let score = 0;
        let answered = false;
        function renderQuestion() {
            answered = false;
            const item = questions[index];
            document.getElementById("questionNumber").textContent = "Pregunta " + (index + 1) + " de " + questions.length;
            document.getElementById("questionText").innerHTML = item.q;
            document.getElementById("scoreText").textContent = "Puntos: " + score + "/" + questions.length;
            document.getElementById("progressBar").style.width = ((index / questions.length) * 100) + "%";
            document.getElementById("nextButton").disabled = true;
            document.getElementById("feedback").className = "feedback";
            document.getElementById("feedback").innerHTML = "";
            document.getElementById("result").className = "result";
            const options = document.getElementById("options");
            options.innerHTML = "";
            item.options.forEach(function(option, optionIndex) {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "option";
                button.textContent = String.fromCharCode(65 + optionIndex) + ") " + option;
                button.addEventListener("click", function() { answer(optionIndex); });
                options.appendChild(button);
            });
        }
        function answer(optionIndex) {
            if (answered) return;
            answered = true;
            const item = questions[index];
            const ok = optionIndex === item.answer;
            if (ok) score += 1;
            const feedback = document.getElementById("feedback");
            feedback.className = "feedback show " + (ok ? "good" : "bad");
            feedback.innerHTML = (ok ? "<strong>&iexcl;Correcto!</strong> " : "<strong>No era esa.</strong> ") + item.note;
            document.getElementById("scoreText").textContent = "Puntos: " + score + "/" + questions.length;
            document.getElementById("nextButton").disabled = false;
        }
        document.getElementById("nextButton").addEventListener("click", function() {
            index += 1;
            if (index >= questions.length) {
                document.getElementById("progressBar").style.width = "100%";
                const result = document.getElementById("result");
                let label = "Buen recorrido.";
                if (score === questions.length) label = "Dominio total del repaso.";
                else if (score >= 8) label = "Muy buen nivel general.";
                else if (score >= 6) label = "Base s&oacute;lida, con margen para afinar.";
                result.className = "result show";
                result.innerHTML = "<h2>Resultado final</h2><p style=\"margin-top:10px;\">Terminaste con <strong>" + score + "/" + questions.length + "</strong>. " + label + "</p>";
                document.getElementById("nextButton").disabled = true;
                return;
            }
            renderQuestion();
        });
        document.getElementById("restartButton").addEventListener("click", function() {
            index = 0;
            score = 0;
            renderQuestion();
        });
        renderQuestion();
    </script>
</body>
</html>
